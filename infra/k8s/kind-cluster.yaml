kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: skillbridge
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 3000
        hostPort: 3000
        protocol: TCP
      - containerPort: 3001
        hostPort: 3001
        protocol: TCP
      - containerPort: 8000
        hostPort: 8000
        protocol: TCP
  - role: worker
  - role: worker
