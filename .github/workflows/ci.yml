name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint API
        run: pnpm --filter @skillbridge/api lint
      - name: Test API
        run: pnpm --filter @skillbridge/api test

  lint-and-test-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint web
        run: pnpm --filter @skillbridge/web lint
      - name: Test web
        run: pnpm --filter @skillbridge/web test

  lint-and-test-processor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/processor/requirements.txt
      - name: Install dependencies
        run: pip install -r services/processor/requirements.txt
      - name: Test processor
        run: pytest services/processor/tests

  build-images:
    runs-on: ubuntu-latest
    needs: [lint-and-test-api, lint-and-test-web, lint-and-test-processor]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f apps/api/Dockerfile .
      - name: Build web image
        run: docker build -f apps/web/Dockerfile .
      - name: Build processor image
        run: docker build -f services/processor/Dockerfile .
